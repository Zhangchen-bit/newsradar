name: Refresh news.json

on:
  schedule:
    - cron: '*/15 * * * *'     # every 15 min (GitHub may delay 5-15 min)
  workflow_dispatch:           # allow manual trigger

permissions:
  contents: write              # let GITHUB_TOKEN commit to this repo

concurrency:
  group: refresh-news
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: python3 -m pip install --quiet requests

      - name: Generate news.json
        run: python3 cloud_export.py --out static_public/news.json --window 24

      - name: Commit if changed
        run: |
          set -x
          ls -la static_public/news.json
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git status --short
          git add static_public/news.json
          git status --short
          if git diff --staged --quiet; then
            echo "no staged changes, skipping commit"
            exit 0
          fi
          git commit -m "data: refresh $(date -u +%Y-%m-%dT%H:%MZ)"
          git log -1 --oneline
          # Refresh against remote first (in case other commits landed)
          git pull --rebase origin main || true
          git push origin HEAD:main
